name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@3bab619c84f7f115693f78dbe8c7c76f2b7a31fb # v1.14.2
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
