name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@c398c241243d9abf13d094e622211ea3692bf1b6 # v1.14.13
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
