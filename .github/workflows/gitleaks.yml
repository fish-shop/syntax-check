name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@d7ced0f5d47c0a6a1c55b8b1f3ff9b16b2bcb334 # v1.13.49
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
