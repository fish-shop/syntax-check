name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@eb4eb291bc65d892c23d99edff09fc5e80294917 # v1.14.6
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
