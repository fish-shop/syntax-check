name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@8ef68690e6bbe9a7aca9a307b2583f07aaa90f59 # v1.14.0
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
