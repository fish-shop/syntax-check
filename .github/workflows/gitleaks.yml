name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@a1ca097199775dd72af261d4c5b03e3e3720b461 # v1.14.1
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
