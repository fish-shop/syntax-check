name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@cc9b0dafea3fc317b270e945841f103f0d3f1048 # v1.14.7
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
