name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@c55b3551f399958b0b2d5599c0b11f94d16d165f # v1.13.47
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
