name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@75400973feeddc1262750b56a6482d8e87293241 # v1.14.9
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
