name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@91de0a350447cb0c21993da61bb2cc40393dd928 # v1.14.12
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
