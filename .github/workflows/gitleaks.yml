name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@c582fdf0e7c07dc76f55b4bb7eb497bd576da949 # v1.14.11
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
