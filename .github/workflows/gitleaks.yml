name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@2a791e6be59d24859693bf9a1954a5aa3ba4378c # v1.14.8
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
