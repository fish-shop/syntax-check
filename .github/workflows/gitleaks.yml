name: Gitleaks SAST scan
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  gitleaks:
    name: Gitleaks SAST scan
    permissions:
      pull-requests: write
    uses: fish-shop/workflows/.github/workflows/gitleaks.yml@f51e302b38504e77ec3d2a6c874a45406bd14aad # v1.14.5
    secrets:
      gitleaks_license: ${secrets.GITLEAKS_LICENSE}
